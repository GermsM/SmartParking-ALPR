{% extends 'base.html' %}
{% block title %}Changer le mot de passe — Parking UCB{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-ps">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Changer mon mot de passe</h1>
                <form method="post" action="{{ url_for('auth.change_password') }}">
                    <div class="mb-3">
                        <label class="form-label" for="current_password">Mot de passe actuel</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="current_password" name="current_password" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('current_password', this)" title="Afficher/masquer"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="new_password">Nouveau mot de passe</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="4">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('new_password', this)" title="Afficher/masquer"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="confirm_password">Confirmer</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="4">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)" title="Afficher/masquer"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="{{ url_for('index') if session.role == 'admin' else url_for('live') }}" class="btn btn-outline-secondary ms-2">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
