{% extends 'base.html' %}
{% block title %}Mot de passe oublié — Parking UCB{% endblock %}
{% block content %}

<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-key text-warning" style="font-size: 2.5rem;"></i>
        <h2 class="h4 mt-2 mb-1">Récupération administrateur</h2>
        <p class="text-secondary small mb-0">Réservé au compte <strong>admin</strong>. Code de récupération fourni par l'université.</p>
    </div>

    <form method="post" action="{{ url_for('auth.forgot_password') }}">
        <div class="mb-3">
            <label class="form-label" for="username">Nom d'utilisateur admin</label>
            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label" for="recovery_code">Code de récupération</label>
            <input type="text" class="form-control" id="recovery_code" name="recovery_code" required placeholder="Code UCB fourni en production">
        </div>
        <div class="mb-4">
            <label class="form-label" for="new_password">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-warning w-100 py-2 mb-2">Réinitialiser le mot de passe</button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary w-100">Retour à la connexion</a>
    </form>
</div>

{% endblock %}
